      <line x1="120" y1="148" x2="148" y2="196"><animate attributeName="x2" values="148;132;148" dur="1s" repeatCount="indefinite"/></line>
    </g>
  </g>
  <text x="120" y="226" text-anchor="middle" fill="#9fc6e8" font-family="system-ui,sans-serif" font-size="14">Jumping Jacks</text>
