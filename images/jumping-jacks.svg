      <stop offset="0" stop-color="#1e3a5f"/><stop offset="1" stop-color="#0f2238"/>
    </linearGradient>
  </defs>
  <rect width="240" height="240" rx="18" fill="url(#bg)"/>
  <g fill="none" stroke="#7fd1ff" stroke-width="7" stroke-linecap="round">
    <circle cx="120" cy="62" r="16" fill="#7fd1ff" stroke="none"/>
    <line x1="120" y1="78" x2="120" y2="148"/>
    <g>
      <line x1="120" y1="92" x2="80" y2="64"><animate attributeName="x2" values="80;150;80" dur="1s" repeatCount="indefinite"/><animate attributeName="y2" values="64;58;64" dur="1s" repeatCount="indefinite"/></line>
      <line x1="120" y1="92" x2="160" y2="64"><animate attributeName="x2" values="160;90;160" dur="1s" repeatCount="indefinite"/><animate attributeName="y2" values="64;58;64" dur="1s" repeatCount="indefinite"/></line>
