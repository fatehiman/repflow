<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f2238" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <title>Light Workout</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="home">
  <main class="home-main">
    <header class="home-header">
      <h1 class="brand">Light&nbsp;Workout</h1>
      <p class="tagline">Pick a routine and follow along</p>
    </header>

    <nav class="routine-list" id="routineList"></nav>

    <footer class="home-footer">No equipment needed</footer>
  </main>

  <script src="data/exercises.js"></script>
  <script src="js/home.js"></script>
  <script>
    // Online-only site for now (PWA/offline retired). Remove any service
    // worker a previous version installed, and clear its caches, so the site
    // always loads fresh from the network with no stale-cache surprises.
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.getRegistrations()
        .then(function (regs) { regs.forEach(function (r) { r.unregister(); }); })
        .catch(function () {});
    }
    if (window.caches && caches.keys) {
      caches.keys().then(function (keys) {
        keys.forEach(function (k) { caches.delete(k); });
      }).catch(function () {});
    }
  </script>
</body>
</html>
