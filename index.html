<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f2238" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Light Workout" />
  <title>Light Workout</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="home">
  <main class="home-main">
    <header class="home-header">
      <h1 class="brand">Light&nbsp;Workout</h1>
      <p class="tagline">Pick a routine and follow along</p>
    </header>

    <nav class="routine-list" id="routineList"></nav>

    <footer class="home-footer">No equipment needed</footer>
  </main>

  <script src="data/exercises.js"></script>
  <script src="js/home.js"></script>
  <script>
    // Register the service worker so the app works fully offline after the
    // first visit. No-ops on file:// (SW needs http/https) — that's fine,
    // the page still runs from the local data file.
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js").catch(function () {});
      });
    }
  </script>
</body>
</html>
